backend:
  name: github
  repo: cesarleyto/juanapola
  branch: main

# Carpetas de imágenes por default
media_folder: "public/assets/images"
public_folder: "/assets/images"

locale: es
logo_url: "/assets/logo/logocms.svg"

collections:
  # ==========================================
  # 1. AJUSTES GLOBALES (Español)
  # ==========================================
  - name: "ajustes_es"
    label: "⚙️ Ajustes (Español)"
    editor:
      preview: false
    files:
      - label: "Traducciones UI"
        name: "translate"
        file: "src/data/translate.json"
        fields:
          - label: "Textos en Español"
            name: "es"
            widget: "object"
            fields:
              - { label: "Botón Leer más", name: "leerMas", widget: "string" }
              - { label: "Botón Portafolio", name: "portafolioCompleto", widget: "string" }
          - label: "Textos en Inglés"
            name: "en"
            widget: "object"
            fields:
              - { label: "Botón Read more", name: "leerMas", widget: "string" }
              - { label: "Botón Full portfolio", name: "portafolioCompleto", widget: "string" }

      - label: "Datos Generales"
        name: "general"
        file: "src/data/settings.json"
        fields:
          - { label: "Título del Proyecto", name: "title", widget: "string" }
          - { label: "Descripción SEO", name: "description", widget: "text" }
          - { label: "Palabras Clave", name: "keywords", widget: "string", required: false }
          - { label: "Dirección", name: "address", widget: "string", required: false }
          - { label: "Email de Contacto", name: "email", widget: "string", required: false }
          - label: "Teléfonos / WhatsApp"
            name: "telefonos"
            widget: "list"
            required: false
            fields:
              - { label: "Tipo", name: "tipo", widget: "select", options: ["Llamada", "WhatsApp", "Telegram"] }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Número", name: "numero", widget: "string" }
          - label: "Redes Sociales"
            name: "redes"
            widget: "list"
            required: false
            fields:
              - { label: "Red", name: "red", widget: "select", options: ["Facebook", "Instagram", "TikTok", "Spotify", "LinkedIn", "X", "YouTube"] }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Navegación (Menú)"
        name: "nav"
        file: "src/data/nav.json"
        fields:
          - { label: "Mostrar Redes Sociales", name: "showSocials", widget: "boolean", default: true }
          - label: "Enlaces Simples"
            name: "enlaces"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Botones Principales"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Portada (Home)"
        name: "portada"
        file: "src/data/portada.json"
        fields:
          - { label: "Título Principal", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text", required: false }
          - { label: "Imagen", name: "image", widget: "image", required: false }
          - label: "Botones"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Destacado"
        name: "destacado"
        file: "src/data/destacado.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text", required: false }
          - { label: "Imagen", name: "image", widget: "image", required: false }
          - label: "Botones"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Ajustes del Blog"
        name: "blog_settings"
        file: "src/data/blog-settings.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text" }

  # ==========================================
  # 2. AJUSTES GLOBALES (Inglés)
  # ==========================================
  - name: "ajustes_en"
    label: "⚙️ Ajustes (Inglés)"
    editor:
      preview: false
    files:
      - label: "Datos Generales (EN)"
        name: "general_en"
        file: "src/data/settings-en.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text" }
          - { label: "Palabras Clave", name: "keywords", widget: "string", required: false }
          - { label: "Dirección", name: "address", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - label: "Teléfonos"
            name: "telefonos"
            widget: "list"
            required: false
            fields:
              - { label: "Tipo", name: "tipo", widget: "select", options: ["Llamada", "WhatsApp", "Telegram"] }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Número", name: "numero", widget: "string" }
          - label: "Redes Sociales"
            name: "redes"
            widget: "list"
            required: false
            fields:
              - { label: "Red", name: "red", widget: "select", options: ["Facebook", "Instagram", "TikTok", "Spotify", "LinkedIn", "X", "YouTube"] }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Navegación (EN)"
        name: "nav_en"
        file: "src/data/nav-en.json"
        fields:
          - { label: "Mostrar Redes", name: "showSocials", widget: "boolean", default: true }
          - label: "Enlaces"
            name: "enlaces"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Botones"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Portada (EN)"
        name: "portada_en"
        file: "src/data/portada-en.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text", required: false }
          - { label: "Imagen", name: "image", widget: "image", required: false }
          - label: "Botones"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Destacado (EN)"
        name: "destacado_en"
        file: "src/data/destacado-en.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text", required: false }
          - { label: "Imagen", name: "image", widget: "image", required: false }
          - label: "Botones"
            name: "botones"
            widget: "list"
            required: false
            fields:
              - { label: "Texto", name: "texto", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Ajustes del Blog (EN)"
        name: "blog_settings_en"
        file: "src/data/blog-settings-en.json"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descripción", name: "description", widget: "text" }

  # ==========================================
  # 3. SISTEMA RELACIONAL (Categorías y Autores)
  # ==========================================
  - name: "categorias"
    label: "🏷️ Categorías"
    folder: "src/data/categorias"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Nombre de Categoría", name: "title", widget: "string" }

  - name: "autores"
    label: "👥 Perfiles de Autor"
    folder: "src/data/autores"
    media_folder: "/public/assets/images/autores"
    public_folder: "/assets/images/autores"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - { label: "Nombre del Autor", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "string" }
      - { label: "Avatar", name: "avatar", widget: "image", required: false }
      - label: "Redes"
        name: "redes"
        widget: "list"
        required: false
        fields:
          - { label: "Red", name: "red", widget: "select", options: ["Facebook", "Instagram", "TikTok", "Spotify", "LinkedIn", "X", "YouTube"] }
          - { label: "URL", name: "url", widget: "string" }

  # ==========================================
  # 4. CONSTRUCTORES DE CONTENIDO (ESPAÑOL)
  # ==========================================
  - name: "paginas_es"
    label: "📄 Páginas (ES)"
    folder: "src/content/paginas/es"
    media_folder: "/public/assets/images/paginas"
    public_folder: "/assets/images/paginas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título de la Página", name: "title", widget: "string" }
      - { label: "Descripción SEO", name: "description", widget: "text" }
      - { label: "Fecha", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { label: "Imagen", name: "heroImage", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "blog_es"
    label: "📝 Posteos (ES)"
    folder: "src/content/blog/es"
    media_folder: "/public/assets/images/blog"
    public_folder: "/assets/images/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título del post", name: "title", widget: "string" }
      - { label: "Descripción SEO", name: "description", widget: "text" }
      - { label: "Autor", name: "author", widget: "relation", collection: "autores", search_fields: ["name"], value_field: "name", display_fields: ["name"], required: false }
      - { label: "Categoría", name: "category", widget: "relation", collection: "categorias", search_fields: ["title"], value_field: "title", display_fields: ["title"] }
      - { label: "Fecha", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Imagen", name: "heroImage", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  # ==========================================
  # 5. CONSTRUCTORES DE CONTENIDO (INGLÉS)
  # ==========================================
  - name: "paginas_en"
    label: "📄 Páginas (EN)"
    folder: "src/content/paginas/en"
    media_folder: "/public/assets/images/paginas"
    public_folder: "/assets/images/paginas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título de la Página", name: "title", widget: "string" }
      - { label: "Descripción SEO", name: "description", widget: "text" }
      - { label: "Fecha", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { label: "Imagen", name: "heroImage", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "blog_en"
    label: "📝 Posteos (EN)"
    folder: "src/content/blog/en"
    media_folder: "/public/assets/images/blog"
    public_folder: "/assets/images/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título del post", name: "title", widget: "string" }
      - { label: "Descripción SEO", name: "description", widget: "text" }
      - { label: "Autor", name: "author", widget: "relation", collection: "autores", search_fields: ["name"], value_field: "name", display_fields: ["name"], required: false }
      - { label: "Categoría", name: "category", widget: "relation", collection: "categorias", search_fields: ["title"], value_field: "title", display_fields: ["title"] }
      - { label: "Fecha", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Imagen", name: "heroImage", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }